name: Captura de Notícias

on:
  schedule:
    - cron: '0 12 * * 1'   # toda segunda-feira ao meio-dia UTC (9h Brasília)
  workflow_dispatch:         # permite rodar manualmente pelo painel do GitHub

permissions:
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  captura:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r .github/scripts/requirements.txt

      - name: Executar captura
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python .github/scripts/captura.py
